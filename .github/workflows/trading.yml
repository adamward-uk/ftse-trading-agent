name: FTSE 250 Trading Agent

on:
  schedule:
    - cron: '30 16 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-yfinance
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Run trading agent
        run: python ftse_agent.py

      - name: Commit updated portfolio and dashboard
        run: |
          git config user.name  "FTSE Trading Agent"
          git config user.email "trading-agent@github-actions.bot"
          git add portfolio.json dashboard.html trading_log.txt
          git diff --staged --quiet || git commit -m "Trading session: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
